<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WakingLife</title>
  <meta name="description" content="Track your meditation practice with friends. Build consistency and bring your meditative mindset into your waking life.">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #F7F4F0;
      color: #1A1A1A;
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 32px;
    }

    .container {
      max-width: 460px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      display: block;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: 0.05s;
    }

    h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #9A8E83;
      margin-bottom: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .tagline {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.75;
      color: #2A2420;
      margin-bottom: 16px;
    }

    .tagline em {
      font-style: italic;
      color: #1A1A1A;
    }

    .tagline-secondary {
      font-size: 17px;
      font-weight: 400;
      font-style: italic;
      line-height: 1.75;
      color: #9A8E83;
      margin-bottom: 52px;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: #D9D0C7;
      margin: 0 auto 52px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: #D04030;
      color: #FFFFFF;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 13px 26px;
      border-radius: 100px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn svg {
      flex-shrink: 0;
      opacity: 0.85;
    }

    footer {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #C0B9B0;
      letter-spacing: 0.04em;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover {
      color: #9A8E83;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="icon.png" alt="WakingLife" class="logo">
    <h1>WakingLife</h1>

    <p class="tagline">
      Awaken into your life by tracking your<br>
      meditation practice with friends.
    </p>

    <div class="divider"></div>

    <p class="tagline-secondary">
      Build a consistent meditation practice so that<br>
      you can bring your meditative mindset<br>
      off the cushion and into your waking life.
    </p>

    <a href="https://chromewebstore.google.com/detail/obhcjafhkcblmmpadjokmddpbhpnhgef?utm_source=item-share-cb" class="btn">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.5 1.5v8M4.5 6.5l3 3 3-3" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 11h11" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Add to Chrome
    </a>
  </div>

  <footer>
    <a href="https://adamjeisen.github.io/wakinglife-privacy/">Privacy Policy</a>
  </footer>

</body>
</html>
